---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-karpenter
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-karpenter
  template:
    metadata:
      labels:
        app: test-karpenter
    spec:
      nodeSelector:
        karpenter.sh/nodepool: default
      containers:
        - name: ubuntu
          image: ubuntu:24.04
          command: ["sleep", "1d"]
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"