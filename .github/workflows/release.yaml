name: Release

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build-publish:
    name: "Build image and publish"
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Unshallow
        run: git fetch --prune --unshallow

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64
      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Github registry login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push edge
        timeout-minutes: 10
        run: make images
        env:
          PUSH: "true"
          TAG: "edge"
      - name: Sign images
        timeout-minutes: 4
        run: make images-cosign
        env:
          TAG: "edge"

      - name: Build and push
        timeout-minutes: 10
        run: make images
        env:
          PUSH: "true"
      - name: Sign images
        timeout-minutes: 4
        run: make images-cosign

  build-publish-dep:
    name: "Publish debian package"
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up go
        timeout-minutes: 5
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
      - name: Set up Cosign
        timeout-minutes: 1
        uses: sigstore/cosign-installer@v3

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "v2.13.3"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
